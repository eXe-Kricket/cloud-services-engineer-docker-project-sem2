services:
  backend:
    image: momo-store-backend:1.0.0
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      GOMAXPROCS: "1"
    ports:
      - "8081:8081"
    networks:
      - backend
    volumes:
      - backend-data:/app/data:rw
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: "0.50"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  frontend:
    image: momo-store-frontend:1.0.0
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VUE_APP_API_URL: /api
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend
      - frontend
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
      - /var/cache/nginx:noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: "0.50"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/momo-store/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  backend-data:
